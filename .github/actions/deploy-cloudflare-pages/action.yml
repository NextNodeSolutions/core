# Deploy a static site to Cloudflare Pages via Direct Upload.
#
# Handles both production and preview deployments:
#   - production: set `production: "true"` (deploys to the main Pages URL)
#   - preview:    omit or set `production: "false"` (deploys to a preview URL)
#
# The caller is responsible for building the site before invoking this action.
# DNS configuration is handled separately.

name: Deploy to Cloudflare Pages
description: Deploy a static site to Cloudflare Pages using wrangler pages deploy

inputs:
  directory:
    description: Path to the directory of static assets to deploy
    required: true
  project-name:
    description: Cloudflare Pages project name
    required: true
  production:
    description: Whether this is a production deployment
    default: "false"
  account-id:
    description: Cloudflare account ID
    required: true
  api-token:
    description: Cloudflare API token with Pages edit permission
    required: true

outputs:
  url:
    description: The deployment URL
    value: ${{ steps.deploy.outputs.deployment-url }}

runs:
  using: composite
  steps:
    - name: Deploy to Cloudflare Pages
      id: deploy
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ inputs.api-token }}
        accountId: ${{ inputs.account-id }}
        command: >-
          pages deploy ${{ inputs.directory }}
          --project-name=${{ inputs.project-name }}
          ${{ inputs.production == 'true' && '--branch=main' || format('--branch=preview-{0}', github.run_id) }}

    - name: Deployment summary
      shell: bash
      run: |
        echo "### Cloudflare Pages Deploy" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Project:** ${{ inputs.project-name }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Environment:** ${{ inputs.production == 'true' && 'production' || 'preview' }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- **URL:** ${{ steps.deploy.outputs.deployment-url }}" >> "$GITHUB_STEP_SUMMARY"
