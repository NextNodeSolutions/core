name: Deploy

on:
    workflow_call:
        inputs:
            environment:
                type: string
                required: true
                description: 'development or production'
            config_file:
                type: string
                default: 'nextnode.toml'
                description: 'Path to nextnode.toml in the calling repo'
            dev_workflow_file:
                type: string
                default: 'deploy-dev.yml'
                description: 'Filename of the dev workflow (for prod gate)'

permissions:
    contents: read
    actions: read
    packages: write

jobs:
    plan:
        name: Plan
        runs-on: ubuntu-latest
        outputs:
            quality_matrix: ${{ steps.plan.outputs.quality_matrix }}
            project_name: ${{ steps.plan.outputs.project_name }}
            has_prod_gate: ${{ steps.plan.outputs.has_prod_gate }}
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: 'true'
                  deps: 'false'

            - name: Plan pipeline
              id: plan
              run: node src/index.ts plan
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}

    quality:
        name: ${{ matrix.task.name }}
        needs: plan
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                task: ${{ fromJSON(needs.plan.outputs.quality_matrix) }}
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: ${{ needs.plan.outputs.has_prod_gate }}

            - name: ${{ matrix.task.name }}
              run: ${{ matrix.task.cmd }}
              env:
                  GH_TOKEN: ${{ github.token }}
                  DEV_WORKFLOW_FILE: ${{ inputs.dev_workflow_file }}

    provision:
        name: Provision
        needs: [plan, quality]
        runs-on: ubuntu-latest
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: 'true'
                  deps: 'false'

            - name: Connect runner to tailnet
              uses: tailscale/github-action@v4
              with:
                  oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
                  tags: tag:ci

            - name: Generate GitHub App token
              id: app-token
              uses: actions/create-github-app-token@v2
              with:
                  app-id: ${{ secrets.NEXTNODE_APP_ID }}
                  private-key: ${{ secrets.NEXTNODE_APP_PRIVATE_KEY }}
                  owner: NextNodeSolutions

            - name: Provision VPS
              run: node src/index.ts provision
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}
                  HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
                  DEPLOY_SSH_PRIVATE_KEY_B64: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY_B64 }}
                  TAILSCALE_AUTH_KEY: ${{ secrets.TS_OAUTH_SECRET }}
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
                  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}

    build-image:
        name: Build image
        needs: [plan, quality]
        runs-on: ubuntu-latest
        outputs:
            image_ref: ${{ steps.compute.outputs.image_ref }}
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: 'true'
                  deps: 'false'

            - uses: docker/setup-buildx-action@v3

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Compute image ref
              id: compute
              run: node src/index.ts compute-image-ref
              working-directory: .infra/packages/infrastructure
              env:
                  GITHUB_REPOSITORY: ${{ github.repository }}
                  GITHUB_SHA: ${{ github.sha }}

            - name: Build and push
              uses: docker/bake-action@v6
              with:
                  files: docker-compose.yml
                  targets: app
                  push: true
                  set: |
                      app.tags=${{ steps.compute.outputs.image_ref }}
                      app.cache-from=type=gha,scope=app
                      app.cache-to=type=gha,scope=app,mode=max

    deploy:
        name: Deploy
        needs: [plan, provision, build-image]
        runs-on: ubuntu-latest
        environment:
            name: ${{ inputs.environment }}
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: 'true'
                  deps: 'false'

            - name: Connect runner to tailnet
              uses: tailscale/github-action@v4
              with:
                  oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
                  tags: tag:ci

            - name: Deploy
              run: node src/index.ts deploy
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}
                  HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
                  DEPLOY_SSH_PRIVATE_KEY_B64: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY_B64 }}
                  TAILSCALE_AUTH_KEY: ${{ secrets.TS_OAUTH_SECRET }}
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
                  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
                  IMAGE_REF: ${{ needs.build-image.outputs.image_ref }}
                  GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  ALL_SECRETS: ${{ toJSON(secrets) }}
