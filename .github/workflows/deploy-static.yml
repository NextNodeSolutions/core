name: Deploy Static

on:
    workflow_call:
        inputs:
            environment:
                type: string
                required: true
                description: 'development or production'
            config_file:
                type: string
                default: 'nextnode.toml'
                description: 'Path to nextnode.toml in the calling repo'

permissions:
    contents: read
    actions: read

jobs:
    plan:
        name: Plan
        runs-on: ubuntu-latest
        outputs:
            quality_matrix: ${{ steps.plan.outputs.quality_matrix }}
            project_name: ${{ steps.plan.outputs.project_name }}
            has_prod_gate: ${{ steps.plan.outputs.has_prod_gate }}
            has_domain: ${{ steps.plan.outputs.has_domain }}
            domain: ${{ steps.plan.outputs.domain }}
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: 'true'
                  deps: 'false'

            - name: Plan pipeline
              id: plan
              run: node src/index.ts
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}

    quality:
        name: ${{ matrix.task.name }}
        needs: plan
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                task: ${{ fromJSON(needs.plan.outputs.quality_matrix) }}
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: ${{ needs.plan.outputs.has_prod_gate }}

            - name: ${{ matrix.task.name }}
              run: ${{ matrix.task.cmd }}
              env:
                  GH_TOKEN: ${{ github.token }}

    ensure-pages:
        name: Ensure Pages Project & Domains
        needs: plan
        runs-on: ubuntu-latest
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: 'true'
                  deps: 'false'

            - name: Ensure Cloudflare Pages project exists
              run: node src/index.ts ensure-pages-project
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

            - name: Attach Pages custom domains
              if: needs.plan.outputs.has_domain == 'true'
              run: node src/index.ts ensure-pages-domains
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

            - name: Sync Pages env vars
              run: node src/index.ts sync-pages-env
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  ALL_SECRETS: ${{ toJSON(secrets) }}

    deploy:
        name: Deploy
        needs: [plan, quality, ensure-pages]
        runs-on: ubuntu-latest
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: 'true'

            - name: Inject deploy env
              run: node src/index.ts deploy-env
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}

            - name: Build
              run: pnpm build

            - uses: NextNodeSolutions/core/.github/actions/deploy-cloudflare-pages@main
              with:
                  directory: dist
                  project-name: ${{ needs.plan.outputs.project_name }}
                  account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    dns:
        name: DNS
        needs: [plan, quality, ensure-pages]
        if: needs.plan.outputs.has_domain == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: 'true'
                  deps: 'false'

            - name: Reconcile Cloudflare DNS
              run: node src/index.ts dns
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
