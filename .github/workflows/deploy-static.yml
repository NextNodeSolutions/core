name: Deploy Static

on:
    workflow_call:
        inputs:
            environment:
                type: string
                required: true
                description: 'development or production'
            config_file:
                type: string
                default: 'nextnode.toml'
                description: 'Path to nextnode.toml in the calling repo'

permissions:
    contents: read
    actions: read

jobs:
    plan:
        name: Plan
        runs-on: ubuntu-latest
        outputs:
            quality_matrix: ${{ steps.plan.outputs.quality_matrix }}
            project_name: ${{ steps.plan.outputs.project_name }}
            has_prod_gate: ${{ steps.plan.outputs.has_prod_gate }}
            has_domain: ${{ steps.plan.outputs.has_domain }}
            build_directory: ${{ steps.plan.outputs.build_directory }}
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: 'true'
                  deps: 'false'

            - name: Plan pipeline
              id: plan
              run: node src/index.ts plan
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}

    quality:
        name: ${{ matrix.task.name }}
        needs: plan
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                task: ${{ fromJSON(needs.plan.outputs.quality_matrix) }}
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: ${{ needs.plan.outputs.has_prod_gate }}

            - name: ${{ matrix.task.name }}
              run: ${{ matrix.task.cmd }}
              env:
                  GH_TOKEN: ${{ github.token }}

    provision:
        name: Provision
        needs: plan
        runs-on: ubuntu-latest
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: 'true'
                  deps: 'false'

            - name: Provision infrastructure
              run: node src/index.ts provision
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    dns:
        name: DNS
        needs: [plan, provision]
        if: needs.plan.outputs.has_domain == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: 'true'
                  deps: 'false'

            - name: Reconcile DNS
              run: node src/index.ts dns
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    deploy:
        name: Deploy
        needs: [plan, quality, provision]
        runs-on: ubuntu-latest
        environment:
            name: ${{ inputs.environment }}
            url: ${{ steps.cf.outputs.url }}
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: 'true'

            - name: Deploy
              run: node src/index.ts deploy
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  ALL_SECRETS: ${{ toJSON(secrets) }}

            - name: Build
              run: pnpm build

            - name: SEO guard
              run: node src/index.ts seo-guard
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}
                  BUILD_DIRECTORY: ${{ github.workspace }}/${{ needs.plan.outputs.build_directory }}

            - uses: NextNodeSolutions/core/.github/actions/deploy-cloudflare-pages@main
              id: cf
              with:
                  directory: ${{ needs.plan.outputs.build_directory }}
                  project-name: ${{ needs.plan.outputs.project_name }}
                  account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
