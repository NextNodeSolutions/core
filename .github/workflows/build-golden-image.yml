name: Build Golden Image

on:
    push:
        branches: [main]
        paths:
            - 'packages/infrastructure/src/domain/hetzner/golden-image.ts'
            - 'packages/infrastructure/src/adapters/hetzner/provision/build-golden-image.ts'
            - 'packages/infrastructure/src/cli/hetzner/build-golden-image.command.ts'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    build:
        name: Build golden image
        runs-on: ubuntu-latest
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: 'true'
                  deps: 'false'

            - name: Build golden image
              run: node src/index.ts build-golden-image
              working-directory: .infra/packages/infrastructure
              env:
                  HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
