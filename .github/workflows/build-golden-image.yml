name: Build Golden Image

on:
    push:
        branches: [main]
        paths:
            - 'packages/infrastructure/src/domain/hetzner/golden-image.ts'
            - 'packages/infrastructure/src/adapters/hetzner/provision/build-golden-image.ts'
            - 'packages/infrastructure/src/cli/hetzner/build-golden-image.command.ts'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    build:
        name: Build golden image
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v5

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install infrastructure deps
              run: pnpm install --filter @nextnode-solutions/infrastructure... --frozen-lockfile --prefer-offline --prod

            - name: Build golden image
              run: node src/index.ts build-golden-image
              working-directory: packages/infrastructure
              env:
                  HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
