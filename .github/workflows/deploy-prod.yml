name: Deploy Prod

on:
  workflow_call:
    inputs:
      config_file:
        type: string
        default: "nextnode.toml"
        description: "Path to nextnode.toml in the calling repo"

permissions:
  contents: read
  checks: read

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      quality_matrix: ${{ steps.plan.outputs.quality_matrix }}
      project_name: ${{ steps.plan.outputs.project_name }}
      development_enabled: ${{ steps.plan.outputs.development_enabled }}
    steps:
      - uses: NextNodeSolutions/core/.github/actions/setup@main
        with:
          infra: "true"
          deps: "false"

      - name: Plan pipeline
        id: plan
        run: pnpm exec tsx src/index.ts
        working-directory: .infra/packages/infrastructure
        env:
          PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}

  prod-gate:
    name: Prod Gate
    needs: plan
    if: needs.plan.outputs.development_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Verify dev pipeline passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"

          echo "Checking dev pipeline status for ${SHA}..."

          DEV_RUNS=$(gh api "repos/${REPO}/commits/${SHA}/check-runs?per_page=100" \
            --jq '[.check_runs[] | select(.name | contains("app-dev"))]')

          TOTAL=$(echo "$DEV_RUNS" | jq 'length')
          PASSED=$(echo "$DEV_RUNS" | jq '[.[] | select(.status == "completed" and .conclusion == "success")] | length')

          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::No dev pipeline runs found for ${SHA}. Deploy to development first."
            exit 1
          fi

          if [ "$PASSED" -ne "$TOTAL" ]; then
            echo "::error::Dev pipeline has not fully passed (${PASSED}/${TOTAL} checks succeeded)"
            echo "$DEV_RUNS" | jq -r '.[] | select(.status != "completed" or .conclusion != "success") | "  \(.name): \(.status)/\(.conclusion)"'
            exit 1
          fi

          echo "Prod gate passed: ${PASSED}/${TOTAL} dev checks succeeded for ${SHA}"

  quality:
    name: ${{ matrix.task.name }}
    needs: plan
    if: needs.plan.outputs.development_enabled != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJSON(needs.plan.outputs.quality_matrix) }}
    steps:
      - uses: NextNodeSolutions/core/.github/actions/setup@main

      - name: ${{ matrix.task.name }}
        run: ${{ matrix.task.cmd }}

  deploy:
    name: Deploy
    needs: [plan, prod-gate, quality]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "══════════════════════════════════════════"
          echo "  DEPLOY — production"
          echo "══════════════════════════════════════════"
          echo "Project:  ${{ needs.plan.outputs.project_name }}"
          echo "Gate:     ${{ needs.plan.outputs.development_enabled == 'true' && 'prod-gate (dev verified)' || 'inline quality (direct-to-prod)' }}"
          echo "══════════════════════════════════════════"
