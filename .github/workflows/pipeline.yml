name: NextNode Pipeline

on:
  workflow_call:
    inputs:
      config_file:
        type: string
        default: "nextnode.toml"
        description: "Path to nextnode.toml in the calling repo"
      environment:
        type: string
        default: "development"
        description: "Target environment: development or production"

permissions:
  contents: read

jobs:
  # ── Router ──────────────────────────────────────────────────────────
  # Reads nextnode.toml via the infra CLI and outputs project_type +
  # quality_matrix.  Exactly one route activates per run — the other
  # two appear as a single skipped line in the UI.

  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      quality_matrix: ${{ steps.plan.outputs.quality_matrix }}
      project_name: ${{ steps.plan.outputs.project_name }}
      project_type: ${{ steps.plan.outputs.project_type }}
      project_filter: ${{ steps.plan.outputs.project_filter }}
      publish: ${{ steps.plan.outputs.publish }}
    steps:
      - uses: NextNodeSolutions/core/.github/actions/setup@main
        with:
          infra: "true"
          deps: "false"

      - name: Plan pipeline
        id: plan
        run: pnpm exec tsx src/index.ts
        working-directory: .infra/packages/infrastructure
        env:
          PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}

  # ── Routes ──────────────────────────────────────────────────────────

  package:
    needs: plan
    if: needs.plan.outputs.project_type == 'package'
    uses: ./.github/workflows/route-package.yml
    with:
      quality_matrix: ${{ needs.plan.outputs.quality_matrix }}
      project_name: ${{ needs.plan.outputs.project_name }}
      project_filter: ${{ needs.plan.outputs.project_filter }}
      publish: ${{ needs.plan.outputs.publish }}
    secrets: inherit

  app-dev:
    needs: plan
    if: needs.plan.outputs.project_type == 'app' && inputs.environment == 'development'
    uses: ./.github/workflows/route-app-dev.yml
    with:
      quality_matrix: ${{ needs.plan.outputs.quality_matrix }}
      project_name: ${{ needs.plan.outputs.project_name }}
    secrets: inherit

  app-prod:
    needs: plan
    if: needs.plan.outputs.project_type == 'app' && inputs.environment == 'production'
    uses: ./.github/workflows/route-app-prod.yml
    with:
      quality_matrix: ${{ needs.plan.outputs.quality_matrix }}
      project_name: ${{ needs.plan.outputs.project_name }}
    secrets: inherit
