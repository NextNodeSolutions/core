name: NextNode Pipeline

on:
  workflow_call:
    inputs:
      action:
        type: string
        default: "ci"
        description: "Pipeline action: ci, deploy, destroy, rollback"
      environment:
        type: string
        default: "development"
        description: "Target environment: development or production"
      config_file:
        type: string
        default: "nextnode.toml"
        description: "Path to nextnode.toml in the calling repo"
      force:
        type: boolean
        default: false
      pr_number:
        type: string
        default: ""

permissions:
  contents: read
  packages: write
  pull-requests: write
  deployments: write

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      quality_matrix: ${{ steps.plan.outputs.quality_matrix }}
      project_name: ${{ steps.plan.outputs.project_name }}
      project_type: ${{ steps.plan.outputs.project_type }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6

      - name: Checkout infrastructure
        uses: actions/checkout@v6
        with:
          repository: NextNodeSolutions/core
          path: .infra
          sparse-checkout: packages/infrastructure

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install infrastructure deps
        run: pnpm install --frozen-lockfile
        working-directory: .infra/packages/infrastructure

      - name: Plan pipeline
        id: plan
        run: pnpm exec tsx src/index.ts
        working-directory: .infra/packages/infrastructure
        env:
          PIPELINE_ACTION: plan
          PIPELINE_ENVIRONMENT: ${{ inputs.environment }}
          PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}
          PIPELINE_FORCE: ${{ inputs.force }}
          PIPELINE_PR_NUMBER: ${{ inputs.pr_number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality:
    name: ${{ matrix.task.name }}
    needs: plan
    if: fromJSON(needs.plan.outputs.quality_matrix)[0].id != 'skip'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJSON(needs.plan.outputs.quality_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: ${{ matrix.task.name }}
        run: ${{ matrix.task.cmd }}
