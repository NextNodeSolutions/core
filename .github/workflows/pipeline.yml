name: NextNode Pipeline

on:
  workflow_call:
    inputs:
      config_file:
        type: string
        default: "nextnode.toml"
        description: "Path to nextnode.toml in the calling repo"

permissions:
  contents: read

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      quality_matrix: ${{ steps.plan.outputs.quality_matrix }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6

      - name: Checkout infrastructure
        uses: actions/checkout@v6
        with:
          repository: NextNodeSolutions/core
          path: .infra
          sparse-checkout: |
            packages/infrastructure
            pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: .infra/pnpm-lock.yaml

      - name: Install infrastructure deps
        run: pnpm install --frozen-lockfile
        working-directory: .infra/packages/infrastructure

      - name: Plan pipeline
        id: plan
        run: pnpm exec tsx src/index.ts
        working-directory: .infra/packages/infrastructure
        env:
          PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}

  quality:
    name: ${{ matrix.task.name }}
    needs: plan
    if: fromJSON(needs.plan.outputs.quality_matrix)[0].id != 'skip'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJSON(needs.plan.outputs.quality_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: ${{ matrix.task.name }}
        run: ${{ matrix.task.cmd }}
