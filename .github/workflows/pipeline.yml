name: NextNode Pipeline

on:
  workflow_call:
    inputs:
      config_file:
        type: string
        default: "nextnode.toml"
        description: "Path to nextnode.toml in the calling repo"
      environment:
        type: string
        default: "development"
        description: "Target environment: development or production"

permissions:
  contents: read

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      quality_matrix: ${{ steps.plan.outputs.quality_matrix }}
      project_name: ${{ steps.plan.outputs.project_name }}
      project_type: ${{ steps.plan.outputs.project_type }}
    steps:
      - uses: NextNodeSolutions/core/.github/actions/setup@main
        with:
          infra: "true"
          deps: "false"

      - name: Plan pipeline
        id: plan
        run: pnpm exec tsx src/index.ts
        working-directory: .infra/packages/infrastructure
        env:
          PIPELINE_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config_file }}

  quality:
    name: ${{ matrix.task.name }}
    needs: plan
    if: fromJSON(needs.plan.outputs.quality_matrix)[0].id != 'skip'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJSON(needs.plan.outputs.quality_matrix) }}
    steps:
      - uses: NextNodeSolutions/core/.github/actions/setup@main

      - name: ${{ matrix.task.name }}
        run: ${{ matrix.task.cmd }}

  # ── Post-quality routes ─────────────────────────────────────────────
  # Exactly one of these runs per pipeline invocation, based on
  # project type (app vs package) and target environment.

  publish:
    name: Publish
    needs: [plan, quality]
    if: needs.plan.outputs.project_type == 'package'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "══════════════════════════════════════════"
          echo "  PUBLISH — npm registry"
          echo "══════════════════════════════════════════"
          echo "Project:  ${{ needs.plan.outputs.project_name }}"
          echo "Type:     ${{ needs.plan.outputs.project_type }}"
          echo "Route:    package → publish"
          echo "══════════════════════════════════════════"

  deploy-dev:
    name: Deploy (development)
    needs: [plan, quality]
    if: needs.plan.outputs.project_type == 'app' && inputs.environment == 'development'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "══════════════════════════════════════════"
          echo "  DEPLOY — development"
          echo "══════════════════════════════════════════"
          echo "Project:  ${{ needs.plan.outputs.project_name }}"
          echo "Type:     ${{ needs.plan.outputs.project_type }}"
          echo "Env:      ${{ inputs.environment }}"
          echo "Route:    app → deploy → development"
          echo "══════════════════════════════════════════"

  deploy-prod:
    name: Deploy (production)
    needs: [plan, quality]
    if: needs.plan.outputs.project_type == 'app' && inputs.environment == 'production'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "══════════════════════════════════════════"
          echo "  DEPLOY — production"
          echo "══════════════════════════════════════════"
          echo "Project:  ${{ needs.plan.outputs.project_name }}"
          echo "Type:     ${{ needs.plan.outputs.project_type }}"
          echo "Env:      ${{ inputs.environment }}"
          echo "Route:    app → deploy → production"
          echo "══════════════════════════════════════════"
