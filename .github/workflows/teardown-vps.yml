name: Teardown Hetzner VPS

# Tears down a Hetzner VPS deployment for a target NextNode repo.
#
# Two scopes:
#   - project (default): remove only the project's compose stack, bind mount,
#     Caddy route, certs prefix, DNS records and R2 state. Leaves the VPS,
#     firewall, Tailscale device and host-level services intact.
#   - vps: destroy the whole VPS (server, firewall, Tailscale device, DNS,
#     state). Irreversible and — once colocation lands — will affect every
#     project colocated on that VPS. Use only when the VPS is dedicated.
#
# Run manually from the GitHub UI. Access to this workflow is controlled by
# write access to the core repo.

on:
    workflow_dispatch:
        inputs:
            repository:
                type: string
                required: true
                description: 'owner/repo of the target (e.g. NextNodeSolutions/test-e2e)'
            environment:
                type: choice
                required: true
                options:
                    - development
                    - production
                description: 'Environment to tear down'
            target:
                type: choice
                required: true
                default: project
                options:
                    - project
                    - vps
                description: '"project" removes only the project stack. "vps" destroys the whole VPS.'
            confirm:
                type: string
                required: true
                description: 'Type the project name (matches [project].name in the target nextnode.toml) to authorize teardown'
            config_file:
                type: string
                default: nextnode.toml
                description: 'Path to nextnode.toml inside the target repo'

permissions:
    contents: read

jobs:
    teardown:
        name: Teardown
        runs-on: ubuntu-latest
        steps:
            - uses: NextNodeSolutions/core/.github/actions/setup@main
              with:
                  infra: 'true'
                  deps: 'false'

            - name: Generate GitHub App token
              id: app-token
              uses: actions/create-github-app-token@v2
              with:
                  app-id: ${{ secrets.NEXTNODE_APP_ID }}
                  private-key: ${{ secrets.NEXTNODE_APP_PRIVATE_KEY }}
                  owner: NextNodeSolutions

            - name: Checkout target repository
              uses: actions/checkout@v6
              with:
                  repository: ${{ inputs.repository }}
                  token: ${{ steps.app-token.outputs.token }}
                  path: target
                  sparse-checkout: ${{ inputs.config_file }}
                  sparse-checkout-cone-mode: false

            - name: Guard teardown confirmation
              run: node src/index.ts teardown-guard
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/target/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}
                  TEARDOWN_CONFIRM: ${{ inputs.confirm }}

            - name: Connect runner to tailnet
              uses: tailscale/github-action@v4
              with:
                  oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
                  tags: tag:ci

            - name: Teardown
              run: node src/index.ts teardown
              working-directory: .infra/packages/infrastructure
              env:
                  PIPELINE_CONFIG_FILE: ${{ github.workspace }}/target/${{ inputs.config_file }}
                  PIPELINE_ENVIRONMENT: ${{ inputs.environment }}
                  TEARDOWN_TARGET: ${{ inputs.target }}
                  HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
                  DEPLOY_SSH_PRIVATE_KEY_B64: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY_B64 }}
                  TAILSCALE_AUTH_KEY: ${{ secrets.TS_OAUTH_SECRET }}
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
                  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
